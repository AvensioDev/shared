<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 220" role="img" aria-labelledby="title desc">
  <title id="title">Avensio Logo – Horizontale Variante</title>
  <desc id="desc">Runder Monogrammkreis mit dem Buchstaben A in Weiß auf königsblauem Hintergrund, gefolgt vom Schriftzug vensio in schwarzer Grotesk mit feinem Abstand.</desc>

  <!-- Hintergrund transparent -->
  <defs>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#5E79FF" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#2445FF" stop-opacity="1"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Monogramm -->
  <g transform="translate(52,52)">
    <circle cx="58" cy="58" r="58" fill="url(#shine)" filter="url(#softShadow)"/>
    <path fill="#FFFFFF" d="M58 24c-1.9 0-3.5 1.1-4.2 2.8L28.9 90.7a4.6 4.6 0 0 0 4.2 6.5h8.7a4.6 4.6 0 0 0 4.3-3l5.1-13h31.6l5.1 13a4.6 4.6 0 0 0 4.3 3h8.7a4.6 4.6 0 0 0 4.2-6.5L62.2 26.8A4.6 4.6 0 0 0 58 24zm0 22.9 10.5 27.7H47.5L58 46.9z"/>
  </g>

  <!-- Wortmarke -->
  <g transform="translate(170,35)">
    <text x="0" y="92" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial" font-weight="700" font-size="104" fill="#0A0A0A">
      <tspan fill="#2445FF">A</tspan><tspan font-weight="600" fill="#2B2B2B">vensio</tspan>
    </text>
  </g>

</svg>
